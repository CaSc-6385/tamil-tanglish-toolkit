## Fly.io app config for tamil-edu-api.
## App must be created once via: fly apps create tamil-edu-api
## CI deploys via .github/workflows/deploy-api.yml on push to main.

app = "tamil-edu-api"
primary_region = "iad"  # US East

[build]
  dockerfile = "Dockerfile"

[env]
  TRANSLITERATE_BACKEND = "aksharamukha"
  # Exact-match production + custom-domain origins
  CORS_ORIGINS = "https://tamil-edu-toolkit.vercel.app,https://tamil.academyofsmartthinkers.com"
  # Regex covers Vercel preview/branch deploys (random hash + chandra-s-tamil-projects1 suffix)
  CORS_ORIGIN_REGEX = "^https://tamil-edu-toolkit(-[a-z0-9-]+)?\\.vercel\\.app$"

[http_service]
  internal_port = 8000
  force_https = true
  # Free tier: auto-sleep when idle, wake on first request
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
