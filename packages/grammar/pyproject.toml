[project]
name = "tamil-edu-grammar"
version = "0.0.1"
description = "Tamil sentence-structure analysis (per-word POS + gloss + emoji) via a local Ollama model."
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []  # pure Python (urllib) — the model runs in Ollama, no API key

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-cov>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tamil_edu_grammar"]
