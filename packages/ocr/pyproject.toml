[project]
name = "tamil-edu-ocr"
version = "0.0.1"
description = "Printed Tamil/Tanglish image OCR: Tesseract backend behind a unified OcrEngine protocol."
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []  # core package has no required deps — baseline is pure Python

[project.optional-dependencies]
tesseract = [
    # Tesseract 5 (LSTM) via pytesseract. CPU-only, dependency-light — fits the
    # Fly.io/Hetzner budget in PLAN.md §8. Needs the system `tesseract` binary
    # plus Tamil data:
    #   brew install tesseract tesseract-lang                    # macOS
    #   apt-get install tesseract-ocr tesseract-ocr-tam          # Debian/Ubuntu
    "pytesseract>=0.3.13",
    "pillow>=10.2",
]
dev = [
    "pytest>=8.3",
    "pytest-cov>=5.0",
    # pillow + pytesseract so the mocked Tesseract tests run without the binary.
    "pytesseract>=0.3.13",
    "pillow>=10.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tamil_edu_ocr"]
