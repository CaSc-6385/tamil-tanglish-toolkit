[project]
name = "tamil-edu-transliterate"
version = "0.0.1"
description = "Tanglish-to-Tamil transliteration: baseline + IndicXlit wrappers behind a unified Transliterator protocol."
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = []  # core package has no required deps — baseline is pure Python

[project.optional-dependencies]
indicxlit = [
    # ai4bharat/IndicXlit Tamil model. Pulls in torch, sentencepiece, transformers.
    # Currently BLOCKED on Python 3.11+ — see docs/adr/0002-indicxlit-deferred.md.
    # `uv sync --extra indicxlit`  or  `pip install tamil-edu-transliterate[indicxlit]`
    "ai4bharat-transliteration>=1.1.3",
]
aksharamukha = [
    # Pure Python rule-based transliteration. Real Tamil output, no torch.
    # Substitute for IndicXlit while it's blocked. Default backend in production.
    "aksharamukha>=2.2",
]
openai = [
    # GPT-4o-mini for highest-quality transliteration (handles Tanglish naturally).
    # Requires OPENAI_API_KEY env var. ~$0.0001 per typical request.
    "openai>=1.50.0",
]
dev = [
    "pytest>=8.3",
    "pytest-cov>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tamil_edu_transliterate"]
