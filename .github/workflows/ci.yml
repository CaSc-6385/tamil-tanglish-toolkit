name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  checks: write

# Notes on lockfiles (S0):
#  - No `uv.lock` or `pnpm-lock.yaml` is committed yet — these get generated
#    on first real dependency install in S1. Until then:
#    - `uv sync --all-extras` regenerates `uv.lock` per run
#    - `pnpm install` (no --frozen-lockfile) regenerates per run
#    - setup-uv `enable-cache: false` so the action doesn't error on missing glob
#    - setup-node has no `cache:` for the same reason
#  - Switch back to `--frozen-lockfile` + cache: pnpm + enable-cache: true
#    once lockfiles are committed in S1 (see docs/SPRINTS.md).

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
      - name: Set up Python
        run: uv python install 3.11
      - name: Install workspace
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  lint-js:
    name: Lint JS/TS + Markdown (prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install
      - run: pnpm lint

  test-python:
    name: Test Python (pytest)
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
      - name: Set up Python
        run: uv python install 3.11
      - name: Install workspace
        run: uv sync --all-extras
      - name: Run pytest with coverage
        run: uv run pytest --cov --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false  # don't gate on Codecov outages
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-js:
    name: Test JS/TS (vitest, where present)
    runs-on: ubuntu-latest
    needs: lint-js
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install
      - run: pnpm test

  eval-smoke:
    name: Eval smoke (10 golden pairs)
    runs-on: ubuntu-latest
    needs: test-python
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
      - name: Set up Python
        run: uv python install 3.11
      - name: Install workspace
        run: uv sync --all-extras
      - name: Run eval (10 pairs, baseline model)
        run: uv run python -m eval.run --model baseline --sample 10

  build:
    name: Build (next + docker)
    runs-on: ubuntu-latest
    needs: [test-python, test-js]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install
      - name: Build all workspaces
        run: pnpm build

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: pre-commit/action@v3.0.1
