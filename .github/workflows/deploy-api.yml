name: Deploy API (Fly.io)

# Deploys apps/api to Fly.io. Triggered by:
#   - Push to main touching API code or its workflow
#   - Manual trigger from the Actions tab
#
# Requires the FLY_API_TOKEN repo secret (see docs/SIGNUP.md).
# App must be created once via `fly apps create tamil-edu-api` before first run.

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/transliterate/**"
      - "pyproject.toml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-api-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::warning::FLY_API_TOKEN secret not set — skipping deploy. Set it in repo Settings → Secrets → Actions."
            exit 0
          fi
          flyctl deploy \
            --config apps/api/fly.toml \
            --dockerfile apps/api/Dockerfile \
            --remote-only \
            --strategy rolling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deploy
        if: success()
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then exit 0; fi
          flyctl status --app tamil-edu-api
          # Quick smoke test
          curl -fsS https://tamil-edu-api.fly.dev/health | tee /tmp/health.json
          test "$(jq -r .status < /tmp/health.json)" = "ok"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
