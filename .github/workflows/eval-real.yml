name: Eval (real backend)

# Runs the eval harness against a real (non-baseline) transliteration backend
# on the golden set. Currently aksharamukha (rule-based) because IndicXlit
# can't be installed on Python 3.11+ due to a fairseq bug — see
# docs/adr/0002-indicxlit-deferred.md. Switch back to indicxlit when unblocked.
#
# Trigger:
#   - Manually via the Actions tab
#   - Weekly via cron (Sundays 03:00 UTC) to catch regressions
#   - When eval/, data/golden/, or packages/transliterate/ change on main

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"
  push:
    branches: [main]
    paths:
      - "eval/**"
      - "data/golden/**"
      - "packages/transliterate/**"
      - ".github/workflows/eval-real.yml"

permissions:
  contents: write # commit the report back to eval/reports/

jobs:
  eval:
    name: Eval aksharamukha on golden v1
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.30"
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install workspace + dev extras (includes aksharamukha)
        run: uv sync --all-extras

      - name: Run eval (full golden v1, JSON to inspect metrics)
        id: eval
        run: |
          uv run python -m eval.run --model aksharamukha --set v1 --json --no-report > /tmp/eval.json
          cat /tmp/eval.json
          echo "cer=$(python -c 'import json; print(json.load(open(\"/tmp/eval.json\"))[\"cer\"])')" >> $GITHUB_OUTPUT

      - name: Run eval with markdown report
        run: uv run python -m eval.run --model aksharamukha --set v1

      - name: "Observability — CER must not regress >5 pp vs. baseline 0.36"
        # NOT the S1-1 acceptance gate (that requires IndicXlit; see ADR-0002).
        # This is a tripwire: if aksharamukha CER suddenly jumps it tells us
        # something in tokenizer / golden set / dictionary changed.
        run: |
          CER=$(python -c 'import json; print(json.load(open("/tmp/eval.json"))["cer"])')
          BASELINE=0.36
          MAX_REGRESSION=0.05
          echo "CER = $CER (current aksharamukha baseline = $BASELINE; alert at +$MAX_REGRESSION)"
          python -c "import sys; sys.exit(0 if float('$CER') <= float('$BASELINE') + float('$MAX_REGRESSION') else 1)"

      - name: Commit eval report (only on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eval/reports/
          if git diff --cached --quiet; then
            echo "No new report to commit"
          else
            git commit -m "chore(eval): aksharamukha report (CER=${{ steps.eval.outputs.cer }})"
            git push
          fi
