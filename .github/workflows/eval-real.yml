name: Eval (real backend)

# Runs the eval harness against a real (non-baseline) transliteration backend
# on the golden set. Currently aksharamukha (rule-based) because IndicXlit
# can't be installed on Python 3.11+ due to a fairseq bug — see
# docs/adr/0002-indicxlit-deferred.md. Switch back to indicxlit when unblocked.
#
# Report is uploaded as a workflow artifact (no commit back to main —
# branch protection blocks github-actions[bot]). Download from the Actions
# tab → run → Artifacts to inspect.
#
# Trigger:
#   - Manually via the Actions tab
#   - Weekly via cron (Sundays 03:00 UTC) to catch regressions
#   - When eval/, data/golden/, or packages/transliterate/ change on main

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"
  push:
    branches: [main]
    paths:
      - "eval/**"
      - "data/golden/**"
      - "packages/transliterate/**"
      - ".github/workflows/eval-real.yml"

permissions:
  contents: read

jobs:
  eval:
    name: Eval aksharamukha on golden v1
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.30"
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install workspace + dev extras (includes aksharamukha)
        run: uv sync --all-extras

      - name: Run eval (full golden v1, JSON for gate + markdown for artifact)
        id: eval
        run: |
          uv run python -m eval.run --model aksharamukha --set v1 --json --no-report > eval-result.json
          cat eval-result.json
          CER=$(python -c "import json; print(json.load(open('eval-result.json'))['cer'])")
          echo "cer=$CER" >> "$GITHUB_OUTPUT"
          uv run python -m eval.run --model aksharamukha --set v1

      - name: Upload eval report artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-aksharamukha-v1
          path: |
            eval/reports/*.md
            eval-result.json
          retention-days: 90

      - name: "Observability — CER must not regress >5 pp vs. baseline 0.36"
        # NOT the S1-1 acceptance gate (that requires IndicXlit; see ADR-0002).
        # Tripwire: catches sudden jumps from tokenizer / golden-set changes.
        run: |
          CER='${{ steps.eval.outputs.cer }}'
          BASELINE=0.36
          MAX_REGRESSION=0.05
          echo "CER = $CER (current aksharamukha baseline = $BASELINE; alert at +$MAX_REGRESSION)"
          python -c "import sys; sys.exit(0 if float('$CER') <= float('$BASELINE') + float('$MAX_REGRESSION') else 1)"

      - name: Summary
        if: always()
        run: |
          echo "## Eval results" >> "$GITHUB_STEP_SUMMARY"
          echo "- Model: aksharamukha" >> "$GITHUB_STEP_SUMMARY"
          echo "- CER: ${{ steps.eval.outputs.cer }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Report: see Artifacts on this run" >> "$GITHUB_STEP_SUMMARY"
